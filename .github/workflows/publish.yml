name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ensure tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          project_version = pyproject["project"]["version"]

          init_text = Path("src/pdftwin/__init__.py").read_text()
          match = re.search(r'__version__ = "([^"]+)"', init_text)
          if not match:
              raise SystemExit("Could not find __version__ in src/pdftwin/__init__.py")

          init_version = match.group(1)
          if init_version != project_version:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml has {project_version}, "
                  f"but src/pdftwin/__init__.py has {init_version}"
              )

          tag = os.environ["GITHUB_REF_NAME"]
          expected_tag = f"v{project_version}"
          if tag != expected_tag:
              raise SystemExit(
                  f"Tag mismatch: expected {expected_tag} from package version, got {tag}"
              )

          print(f"Validated release tag {tag}")
          PY

      - name: Run release test suite
        run: python -m pytest tests/test_core.py -q

  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload release distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*

  publish:
    name: Publish release to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/pdftwin/
    permissions:
      id-token: write

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
